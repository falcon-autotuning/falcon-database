name: Test, Compute SHA, and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  VCPKG_PORT_NAME: falcon-database
  VCPKG_PORT_PATH: ports/falcon-database
  VCPKG_JSON: ports/falcon-database/vcpkg.json
  PORTFILE: ports/falcon-database/portfile.cmake

jobs:
  test-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake build-essential mono-complete docker-compose jq

      - name: Run tests (with Docker)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_FEED: ${{ secrets.NUGET_FEED_URL }}
        run: make test-with-docker

      - name: Get version from vcpkg.json
        id: getver
        run: |
          VERSION=$(jq -r .version ${{ env.VCPKG_JSON }})
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release tarball and compute SHA512
        id: sha
        run: |
          TAG="v${{ steps.getver.outputs.version }}"
          curl -L -o falcon-database.tar.gz https://github.com/${{ github.repository }}/archive/refs/tags/$TAG.tar.gz || true
          if [ -f falcon-database.tar.gz ]; then
            SHA=$(sha512sum falcon-database.tar.gz | awk '{print $1}')
            echo "sha512=$SHA" >> $GITHUB_OUTPUT
          else
            echo "sha512=" >> $GITHUB_OUTPUT
          fi

      - name: Print SHA512 and manual update instructions
        run: |
          echo "------------------------------------------------------------"
          echo "Manual update required!"
          echo "Update ports/falcon-database/portfile.cmake with:"
          echo "  REF v${{ steps.getver.outputs.version }}"
          echo "  SHA512 ${{ steps.sha.outputs.sha512 }}"
          echo ""
          echo "Example:"
          echo "  sed -i 's/REF .*/REF v${{ steps.getver.outputs.version }}/' ports/falcon-database/portfile.cmake"
          echo "  sed -i 's/SHA512 .*/SHA512 ${{ steps.sha.outputs.sha512 }}/' ports/falcon-database/portfile.cmake"
          echo "Then commit and push the changes manually."
          echo "------------------------------------------------------------"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload vcpkg binary to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_FEED: ${{ secrets.NUGET_FEED_URL }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: make vcpkg-release-nuget
